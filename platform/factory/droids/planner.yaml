name: adlc-planner
description: >
  Build Brief generator that converts PRDs and research into executable
  technical designs. Produces three layers: Spec (what), Plan (how),
  Tasks (do). Every task is self-contained with zero-read principle —
  all context inlined. Parallel tasks explicitly flagged.
model: claude-opus-4-6
tools:
  - Read
  - Grep
  - Glob
  - LS
  - Execute
  - Edit
  - Create
